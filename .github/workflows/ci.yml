name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  validate:
    name: Validate source and behavior
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shell syntax check
        shell: bash
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r -d '' script; do
            if ! bash -n "$script"; then
              echo "SYNTAX ERROR: $script"
              fail=1
            fi
          done < <(find . -name '*.sh' -not -path '*/node_modules/*' -print0)
          test "$fail" -eq 0

      - name: JSON syntax check
        shell: bash
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r -d '' file; do
            if ! python3 -m json.tool "$file" >/dev/null; then
              echo "JSON PARSE ERROR: $file"
              fail=1
            fi
          done < <(find . -name '*.json' -not -path '*/node_modules/*' -print0)
          test "$fail" -eq 0

      - name: Node hook tests
        run: node --test tests/tool-tracker.test.cjs

      - name: Python runtime tests
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v

      - name: Caddy router tests
        run: bash tests/test-caddy.sh

      - name: Session-capture-summary hook tests
        run: bash tests/test-session-capture-summary.sh

      - name: Onboarding-guide start-over regression test
        run: bash tests/test-onboarding-start-over.sh

      - name: Vault-sync regression tests
        run: bash tests/test-vault-sync.sh

  installer:
    name: Installer (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer regression suite (fast)
        shell: bash
        run: bash tests/test-installer-fast.sh

      - name: Installer regression suite (slow smoke, real repo tree)
        shell: bash
        run: bash tests/test-installer-slow-smoke.sh

      - name: Web-install regression suite
        shell: bash
        run: bash tests/test-web-install.sh
