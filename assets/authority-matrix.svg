<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="1000" height="620" role="img" aria-label="aigent-OS Authority Matrix — 3-tier autonomy system">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1"/>
    </linearGradient>

    <!-- Tier glow filters -->
    <filter id="glow-teal" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-amber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softshadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Tier card fills -->
    <linearGradient id="card-teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d2a20;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1a14;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="card-amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2a1d05;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1508;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="card-red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2a0d0d;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0f0f;stop-opacity:1"/>
    </linearGradient>

    <!-- Pipeline track gradient -->
    <linearGradient id="pipe-track" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e2a3a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e2a3a;stop-opacity:1"/>
    </linearGradient>

    <!-- Flowing dot gradient (simulate motion) -->
    <linearGradient id="dot-flow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#60a5fa;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#60a5fa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="2s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Badge gradients -->
    <radialGradient id="badge-teal" cx="50%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1"/>
    </radialGradient>
    <radialGradient id="badge-amber" cx="50%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1"/>
    </radialGradient>
    <radialGradient id="badge-red" cx="50%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1"/>
    </radialGradient>
  </defs>

  <style>
    /* ── Pulse keyframes for tier borders ── */
    @keyframes pulse-teal {
      0%   { opacity: 0.55; }
      50%  { opacity: 1.0; }
      100% { opacity: 0.55; }
    }
    @keyframes pulse-amber {
      0%   { opacity: 0.45; }
      50%  { opacity: 0.95; }
      100% { opacity: 0.45; }
    }
    @keyframes badge-glow-teal {
      0%   { filter: drop-shadow(0 0 4px #10b981); }
      50%  { filter: drop-shadow(0 0 10px #10b981); }
      100% { filter: drop-shadow(0 0 4px #10b981); }
    }
    @keyframes badge-glow-amber {
      0%   { filter: drop-shadow(0 0 4px #f59e0b); }
      50%  { filter: drop-shadow(0 0 10px #f59e0b); }
      100% { filter: drop-shadow(0 0 4px #f59e0b); }
    }
    @keyframes dot-travel {
      0%   { transform: translateX(0px);   opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateX(680px); opacity: 0; }
    }
    @keyframes dot-travel-b {
      0%   { transform: translateX(0px);   opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateX(680px); opacity: 0; }
    }
    @keyframes dot-travel-c {
      0%   { transform: translateX(0px);   opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateX(680px); opacity: 0; }
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .border-teal  { animation: pulse-teal  2.4s ease-in-out infinite; }
    .border-amber { animation: pulse-amber 3.2s ease-in-out infinite; }
    .badge-t1     { animation: badge-glow-teal  2.4s ease-in-out infinite; }
    .badge-t2     { animation: badge-glow-amber 3.2s ease-in-out infinite; }

    .dot-a { animation: dot-travel   2.8s linear infinite; }
    .dot-b { animation: dot-travel-b 2.8s linear infinite; animation-delay: 0.93s; }
    .dot-c { animation: dot-travel-c 2.8s linear infinite; animation-delay: 1.86s; }
  </style>

  <!-- ══════════════════════════════════════════ -->
  <!-- BACKGROUND                                  -->
  <!-- ══════════════════════════════════════════ -->
  <rect width="1000" height="620" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#60a5fa" stroke-width="0.5">
    <line x1="0" y1="100" x2="1000" y2="100"/>
    <line x1="0" y1="200" x2="1000" y2="200"/>
    <line x1="0" y1="300" x2="1000" y2="300"/>
    <line x1="0" y1="400" x2="1000" y2="400"/>
    <line x1="0" y1="500" x2="1000" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="620"/>
    <line x1="400" y1="0" x2="400" y2="620"/>
    <line x1="600" y1="0" x2="600" y2="620"/>
    <line x1="800" y1="0" x2="800" y2="620"/>
  </g>

  <!-- ══════════════════════════════════════════ -->
  <!-- HEADER                                      -->
  <!-- ══════════════════════════════════════════ -->
  <text x="500" y="34" font-family="monospace" font-size="11" fill="#334155" text-anchor="middle" letter-spacing="4">AIGENT-OS OPERATING SYSTEM</text>
  <text x="500" y="64" font-family="monospace" font-size="26" font-weight="bold" fill="#e2e8f0" text-anchor="middle" letter-spacing="2">AUTHORITY MATRIX</text>
  <!-- Underline accent -->
  <rect x="380" y="72" width="240" height="2" rx="1" fill="#334155"/>
  <rect x="460" y="72" width="80" height="2" rx="1" fill="#60a5fa" opacity="0.7"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- TIER 1 — AUTONOMOUS                         -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Card shadow/glow layer (teal) -->
  <rect x="40" y="92" width="920" height="108" rx="10" fill="#10b981" opacity="0.06"/>

  <!-- Card fill -->
  <rect x="42" y="94" width="916" height="104" rx="9" fill="url(#card-teal)" filter="url(#softshadow)"/>

  <!-- Left border accent — animated pulse -->
  <rect class="border-teal" x="42" y="94" width="6" height="104" rx="3" fill="#10b981"/>

  <!-- Badge circle -->
  <circle class="badge-t1" cx="87" cy="146" r="20" fill="url(#badge-teal)"/>
  <text x="87" y="153" font-family="monospace" font-size="18" font-weight="bold" fill="#064e3b" text-anchor="middle">1</text>

  <!-- Tier label -->
  <text x="122" y="132" font-family="monospace" font-size="11" fill="#34d399" letter-spacing="3">TIER 1</text>

  <!-- Title -->
  <text x="122" y="154" font-family="monospace" font-size="22" font-weight="bold" fill="#6ee7b7" letter-spacing="1">AUTONOMOUS</text>

  <!-- Subtitle -->
  <text x="122" y="178" font-family="sans-serif" font-size="16" fill="#94a3b8">Research. Organize. Format. Route. Recall skills. Hunt workarounds.</text>

  <!-- Tag -->
  <text x="900" y="146" font-family="sans-serif" font-size="16" font-style="italic" fill="#34d399" text-anchor="end" opacity="0.8">It just handles it.</text>

  <!-- Status indicator -->
  <circle cx="930" cy="142" r="5" fill="#10b981">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="930" cy="142" r="9" fill="none" stroke="#10b981" stroke-width="1" opacity="0.3">
    <animate attributeName="r" values="7;12;7" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- ══════════════════════════════════════════ -->
  <!-- TIER 2 — RECOMMEND AND CONFIRM              -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Card shadow/glow (amber) -->
  <rect x="40" y="214" width="920" height="108" rx="10" fill="#f59e0b" opacity="0.05"/>

  <!-- Card fill -->
  <rect x="42" y="216" width="916" height="104" rx="9" fill="url(#card-amber)" filter="url(#softshadow)"/>

  <!-- Left border accent — animated pulse (slower) -->
  <rect class="border-amber" x="42" y="216" width="6" height="104" rx="3" fill="#f59e0b"/>

  <!-- Badge circle -->
  <circle class="badge-t2" cx="87" cy="268" r="20" fill="url(#badge-amber)"/>
  <text x="87" y="275" font-family="monospace" font-size="18" font-weight="bold" fill="#451a03" text-anchor="middle">2</text>

  <!-- Tier label -->
  <text x="122" y="254" font-family="monospace" font-size="11" fill="#fbbf24" letter-spacing="3">TIER 2</text>

  <!-- Title -->
  <text x="122" y="276" font-family="monospace" font-size="22" font-weight="bold" fill="#fde68a" letter-spacing="1">RECOMMEND &amp; CONFIRM</text>

  <!-- Subtitle -->
  <text x="122" y="300" font-family="sans-serif" font-size="16" fill="#94a3b8">Strategy. Delegation. External comms. New tools.</text>

  <!-- Tag -->
  <text x="900" y="268" font-family="sans-serif" font-size="16" font-style="italic" fill="#fbbf24" text-anchor="end" opacity="0.8">It proposes. You approve.</text>

  <!-- Status indicator (amber, slower pulse) -->
  <circle cx="930" cy="264" r="5" fill="#f59e0b">
    <animate attributeName="opacity" values="1;0.3;1" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="930" cy="264" r="9" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.3">
    <animate attributeName="r" values="7;12;7" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <!-- ══════════════════════════════════════════ -->
  <!-- TIER 3 — HUMAN ONLY                         -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Card shadow/glow (red, static) -->
  <rect x="40" y="336" width="920" height="108" rx="10" fill="#ef4444" opacity="0.04"/>

  <!-- Card fill -->
  <rect x="42" y="338" width="916" height="104" rx="9" fill="url(#card-red)" filter="url(#softshadow)"/>

  <!-- Left border — static red, no pulse -->
  <rect x="42" y="338" width="6" height="104" rx="3" fill="#ef4444" opacity="0.8"/>

  <!-- Badge circle -->
  <circle cx="87" cy="390" r="20" fill="url(#badge-red)" filter="url(#glow-red)"/>
  <text x="87" y="397" font-family="monospace" font-size="18" font-weight="bold" fill="#450a0a" text-anchor="middle">3</text>

  <!-- Tier label -->
  <text x="122" y="376" font-family="monospace" font-size="11" fill="#f87171" letter-spacing="3">TIER 3</text>

  <!-- Title -->
  <text x="122" y="398" font-family="monospace" font-size="22" font-weight="bold" fill="#fca5a5" letter-spacing="1">HUMAN ONLY</text>

  <!-- Subtitle -->
  <text x="122" y="422" font-family="sans-serif" font-size="16" fill="#94a3b8">Money. Legal. Hiring. Irreversible moves.</text>

  <!-- Tag -->
  <text x="900" y="390" font-family="sans-serif" font-size="16" font-style="italic" fill="#f87171" text-anchor="end" opacity="0.8">It briefs you. You decide.</text>

  <!-- Static locked indicator (no pulse — this tier is locked) -->
  <rect x="922" y="380" width="16" height="16" rx="2" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
  <rect x="925" y="376" width="10" height="7" rx="5" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
  <rect x="927" y="384" width="6" height="4" rx="1" fill="#ef4444" opacity="0.7"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- PIPELINE FLOW — bottom section              -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Pipeline container -->
  <rect x="40" y="464" width="920" height="80" rx="8" fill="#0c1220" stroke="#1e293b" stroke-width="1"/>

  <!-- Pipeline track -->
  <rect x="140" y="497" width="720" height="6" rx="3" fill="#1e293b"/>

  <!-- Animated flowing dots (three staggered) -->
  <g>
    <circle class="dot-a" cx="140" cy="500" r="5" fill="#60a5fa"/>
    <circle class="dot-b" cx="140" cy="500" r="5" fill="#60a5fa"/>
    <circle class="dot-c" cx="140" cy="500" r="5" fill="#60a5fa"/>
  </g>

  <!-- Pipeline labels — evenly spaced -->
  <text x="140" y="487" font-family="monospace" font-size="13" fill="#475569" text-anchor="middle">EVERY</text>
  <text x="140" y="502" font-family="monospace" font-size="14" font-weight="bold" fill="#64748b" text-anchor="middle">TASK</text>

  <!-- Arrow connector -->
  <text x="228" y="501" font-family="monospace" font-size="18" fill="#334155" text-anchor="middle">→</text>

  <!-- Node 1: DO -->
  <rect x="265" y="485" width="90" height="30" rx="4" fill="#10b98122" stroke="#10b981" stroke-width="1"/>
  <text x="310" y="505" font-family="monospace" font-size="16" font-weight="bold" fill="#34d399" text-anchor="middle">DO</text>

  <!-- Arrow -->
  <text x="384" y="501" font-family="monospace" font-size="18" fill="#334155" text-anchor="middle">→</text>

  <!-- Node 2: DELEGATE -->
  <rect x="407" y="485" width="120" height="30" rx="4" fill="#3b82f622" stroke="#3b82f6" stroke-width="1"/>
  <text x="467" y="505" font-family="monospace" font-size="16" font-weight="bold" fill="#93c5fd" text-anchor="middle">DELEGATE</text>

  <!-- Arrow -->
  <text x="557" y="501" font-family="monospace" font-size="18" fill="#334155" text-anchor="middle">→</text>

  <!-- Node 3: RECOMMEND -->
  <rect x="580" y="485" width="140" height="30" rx="4" fill="#f59e0b22" stroke="#f59e0b" stroke-width="1"/>
  <text x="650" y="505" font-family="monospace" font-size="16" font-weight="bold" fill="#fbbf24" text-anchor="middle">RECOMMEND</text>

  <!-- Arrow -->
  <text x="750" y="501" font-family="monospace" font-size="18" fill="#334155" text-anchor="middle">→</text>

  <!-- Node 4: ESCALATE -->
  <rect x="773" y="485" width="110" height="30" rx="4" fill="#ef444422" stroke="#ef4444" stroke-width="1"/>
  <text x="828" y="505" font-family="monospace" font-size="16" font-weight="bold" fill="#f87171" text-anchor="middle">ESCALATE</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- FOOTER CAPTION                              -->
  <!-- ══════════════════════════════════════════ -->
  <text x="500" y="565" font-family="sans-serif" font-size="15" fill="#475569" text-anchor="middle" font-style="italic">The AI classifies in milliseconds. No ambiguity. No overreach.</text>

  <!-- Corner decoration marks -->
  <path d="M 20 20 L 20 40 L 40 40" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <path d="M 980 20 L 980 40 L 960 40" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <path d="M 20 600 L 20 580 L 40 580" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <path d="M 980 600 L 980 580 L 960 580" fill="none" stroke="#1e293b" stroke-width="1.5"/>

</svg>
